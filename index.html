<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>FOR HIPPO FERN 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Itim&family=Anuphan:wght@300;400;600&display=swap');

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Anuphan', sans-serif;
      background: linear-gradient(135deg, #a197ff, #d7c4fa);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 26px 22px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 25px 50px rgba(183, 94, 255, 0.35);
      position: relative;
      z-index: 2;
    }
    h1 {
      font-family: 'Itim', cursive;
      color: #965eff;
      margin: 6px 0 10px;
      font-size: 26px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
    }

    /* Name animation */
    .love-name {
      font-family: 'Itim', cursive;
      font-size: 24px;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #a197ff, #d7c4fa, #a197ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 2.5s linear infinite;
    }
    @keyframes shine {
      to { background-position: -200% center; }
    }

    .envelope {
      font-size: 88px;
      cursor: pointer;
      animation: float 2.2s ease-in-out infinite;
      margin-top: 10px;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .hidden { display: none; }

    .heart {
      font-size: 48px;
      cursor: pointer;
      margin: 10px;
      animation: pop 0.45s cubic-bezier(.17,.89,.32,1.49);
    }
    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    img {
      width: 100%;
      border-radius: 18px;
      margin-top: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    audio { width: 100%; margin-top: 12px; }

    .float {
      position: fixed;
      top: -10px;
      animation: fall linear forwards;
      z-index: 1;
      opacity: 0.85;
    }
    @keyframes fall { to { transform: translateY(110vh); opacity: 0; } }

    .firework {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: explode 1.2s ease-out forwards;
      z-index: 3;
    }
    @keyframes explode { to { transform: scale(7); opacity: 0; } }

    input {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #ffd1da;
      width: 85%;
      margin-top: 12px;
      font-size: 15px;
      font-family: 'Anuphan', sans-serif;
    }
    button {
      margin-top: 14px;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #a197ff, #d7c4fa);
      color: white;
      font-size: 16px;
      font-family: 'Itim', cursive;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(183, 94, 255, 0.45);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    button:active {
      transform: scale(0.95);
      box-shadow: 0 4px 10px rgba(183, 94, 255, 0.35);
    }
  </style>
</head>
<body>

<div class="card">
  <!-- STEP 0 PASSWORD -->
  <div id="step0">
    <h1>🔐 Birth Day Password</h1>
    <p>รหัสพิเศษคือวันเกิดของฮิปโป</p>
    <input id="password" placeholder="ใส่วันเกิดดิวะ XX/XX/XXXX" />
    <br />
    <button onclick="checkPassword()">เปิดจดหมาย</button>
  </div>

  <!-- STEP 1 -->
  <div id="step1" class="hidden">
    <h1>I MHOODENG EIEI</h1>
    <p><span class="love-name" id="name"></span> 🎀</p>
    <p>อ้วนแล้วอ้วนอีก <strong id="date"></strong></p>
    <p>แตะที่จดหมายเร้วไอ่หมู มีอะไรจะบอกก</p>
    <div class="envelope" onclick="openEnvelope()">💌</div>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden">
    <h1>กดกินแซ่บให้ครบก่อนน 🥩</h1>
    <p id="counter">0 / 16</p>
    <div id="hearts"></div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" class="hidden">
    <h1><span class="love-name" id="name2"></span> 💕</h1>
    <p>
      กินจนอ้วนละเห้ยยย กินเยอะ กินแยะ กินจุ้บ กินจิ้บ หมูเด้งอ้วนแล้วอ้วนอีก
      หยอกๆนะๆๆๆๆ ไม่งอนเด้อออ55 🎀🎀
    </p>
    <img src="https://cdn.discordapp.com/attachments/1170584993630789703/1477715357312749588/snapedit_1772352047259.jpg?ex=69a5c52b&is=69a473ab&hm=fc7248bae54aa5b8ab563f53bb184e01f5b9476bebfc9371ba67e91b617e70ed&" />
<audio id="bgm" src="40.mp3"></audio>
<audio id="kissSound" src="kiss.mp3"></audio>

    <button onclick="loveReply()">🎁 กินจนอ้วนละเห้ยยย</button>
    <p id="reply" style="margin-top:15px;font-size:18px;color:#ff5e78;display:none;"></p>
  </div>
</div>

<script>
  /* ===== เอฟเฟกต์ตอนกดรักเธอที่สุด ===== */
  function loveReply() {
    const reply = document.getElementById('reply');
    reply.style.display = 'block';
    reply.innerText = 'กินน้อยๆหน่อยเห้ยอ้วนหมดแล้ว 🐖🐖';

    bigFireworks();
    startPhotoRain();
  }

  function startPhotoRain() {
    const images = [
      'https://cdn.discordapp.com/attachments/1170584993630789703/1477715356578615316/snapedit_1772352084551.jpg?ex=69a5c52b&is=69a473ab&hm=09267348873df7b6c78302fe17d037308e8a759b0aa084f36df44146e5a14005&',
      'https://cdn.discordapp.com/attachments/1170584993630789703/1477715357312749588/snapedit_1772352047259.jpg?ex=69a5c52b&is=69a473ab&hm=fc7248bae54aa5b8ab563f53bb184e01f5b9476bebfc9371ba67e91b617e70ed&',
      'https://cdn.discordapp.com/attachments/1170584993630789703/1477715357853552702/super_resolution_20260301143255286.jpg?ex=69a5c52b&is=69a473ab&hm=50820adfa38d0655c6505b59ec0b4ee73df75b72f0ea3fb3149ba5775bb6da95&'
    ];

    for (let i = 0; i < 40; i++) {
      const img = document.createElement('img');
      img.src = images[Math.floor(Math.random() * images.length)];
      img.style.position = 'fixed';
      img.style.top = '-120px';
      img.style.left = Math.random() * 100 + 'vw';
      img.style.width = 60 + Math.random() * 40 + 'px';
      img.style.borderRadius = '15px';
      img.style.zIndex = 4;
      img.style.animation = `fall ${3 + Math.random() * 3}s linear forwards`;
      document.body.appendChild(img);
      setTimeout(() => img.remove(), 7000);
    }
  }
</script>


<script>
  /* ===== ตั้งค่าเองตรงนี้ ===== */
  const loverName = "MINEMElODY FERN";
  const coupleDate = "23 มีนาคม 2026";
  const secretPassword = "10/06/2008";
  const totalHeart = 16;

  // init text
  document.getElementById('name').innerText = loverName;
  document.getElementById('name2').innerText = loverName;
  document.getElementById('date').innerText = coupleDate;

  let heartCount = 0;

  function checkPassword() {
    const input = document.getElementById('password').value;
    if (input === secretPassword) {
      document.getElementById('step0').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');

      startFloating();
      bigFireworks();

      const bgm = document.getElementById('bgm');
      if (bgm) {
        bgm.currentTime = 0;
        bgm.play().catch(() => {});
      }
    } else {
      alert('รหัสไม่ถูกต้องนะไอ่อ้วนเอ้ย 😝');
    }
  }

  function openEnvelope() {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    heartCount = 0;
    document.getElementById('counter').innerText = heartCount + ' / ' + totalHeart;
    document.getElementById('hearts').innerHTML = '';
    spawnHeart();
  }

  function spawnHeart() {
    const heart = document.createElement('span');
    heart.innerText = '💗';
    heart.className = 'heart';
    heart.onclick = () => {
      const kiss = document.getElementById('kissSound');
      if (kiss) kiss.play().catch(() => {});

      heart.remove();
      heartCount++;
      document.getElementById('counter').innerText = heartCount + ' / ' + totalHeart;

      if (heartCount >= totalHeart) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        bigFireworks();
      } else {
        spawnHeart();
      }
    };
    document.getElementById('hearts').appendChild(heart);
  }

  function startFloating() {
    setInterval(() => {
      const el = document.createElement('div');
      el.className = 'float';
      el.innerHTML = Math.random() > 0.5 ? '💖' : '❄️';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = 16 + Math.random() * 20 + 'px';
      el.style.animationDuration = 3 + Math.random() * 3 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }, 400);
  }

  function bigFireworks() {
    for (let i = 0; i < 40; i++) {
      const fw = document.createElement('div');
      fw.className = 'firework';
      fw.style.left = Math.random() * 100 + 'vw';
      fw.style.top = Math.random() * 100 + 'vh';
      fw.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
      document.body.appendChild(fw);
      setTimeout(() => fw.remove(), 1500);
    }
  }
</script>

</body>
</html>
